name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd gateway && npm ci
        cd ../pedidos && npm ci
        cd ../pagamentos && npm ci
        cd ../estoque && npm ci

    - name: Run lint (placeholder)
      run: echo "no lint configured"

    - name: Run tests (placeholder)
      run: echo "no tests configured"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY_URL }}
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASS }}

    - name: Build and push images
      uses: docker/build-push-action@v4
      with:
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/pedidos_veloz-gateway:${{ env.IMAGE_TAG }}
          ${{ secrets.REGISTRY_URL }}/pedidos_veloz-pedidos:${{ env.IMAGE_TAG }}
          ${{ secrets.REGISTRY_URL }}/pedidos_veloz-pagamentos:${{ env.IMAGE_TAG }}
          ${{ secrets.REGISTRY_URL }}/pedidos_veloz-estoque:${{ env.IMAGE_TAG }}
        file: ./gateway/Dockerfile
        build-args: |
          NODE_ENV=production

    - name: Scan images (optional)
      run: echo "Scanning step - configure a scanner like Trivy"